<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Detail: {{ user.username }}</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">
                    <a href="{% url 'user-list' %}" class="btn btn-sm btn-secondary mb-3">&larr; Back to List</a>
                    <h3 class="card-title text-center mb-4">Edit User: {{ user.username }}</h3>

                    <!-- আপডেট ফর্ম -->
                    <form action="{% url 'user-detail' user.id %}" method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username" value="{{ user.username }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="user_type" class="form-label">User Type</label>
                            <select class="form-select" id="user_type" name="user_type" required>
                                <option value="investor" {% if user.user_type == 'investor' %}selected{% endif %}>Investor</option>
                                <option value="admin" {% if user.user_type == 'admin' %}selected{% endif %}>Admin</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success w-100 mb-3">Update Profile</button>
                    </form>

                    <!-- ডিলিট করার বাটন (JavaScript দিয়ে করা হয়েছে API কে সরাসরি কল করার জন্য) -->
                    <button onclick="deleteUser({{ user.id }})" class="btn btn-danger w-100">Delete User</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ডিলিট করার স্ক্রিপ্ট (Hybrid API Delete সাপোর্ট করার জন্য) -->
<script>
function deleteUser(userId) {
    if (confirm("Are you sure you want to delete this user?")) {
        fetch(`/accounts/users/${userId}/`, {
            method: 'DELETE',
            headers: {
                'X-CSRFToken': '{{ csrf_token }}',
                'Accept': 'application/json'
            }
        })
        .then(response => {
            if (response.ok) {
                alert("User deleted successfully!");
                window.location.href = "{% url 'user-list' %}";
            } else {
                alert("Something went wrong!");
            }
        });
    }
}
</script>
</body>
</html>
